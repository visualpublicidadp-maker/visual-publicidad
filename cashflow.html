<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CashFlow">
<meta name="theme-color" content="#0C111B">
<title>CashFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CASHFLOW v8 — Spacing audit complete
   iPhone 13: 390x844pt, status bar ~47px, 
   home indicator ~34px
   ═══════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
–bg:#0C111B;
–sf:#151C2C;
–sf2:#1C2537;
–brd:rgba(255,255,255,.06);
–brd2:rgba(255,255,255,.12);
–fg:#EEF2FA;
–fg2:#8896B0;
–fg3:#576580;
–mint:#34D399;
–mint-s:rgba(52,211,153,.10);
–rose:#FB7185;
–rose-s:rgba(251,113,133,.08);
–amber:#FBBF24;
–amber-s:rgba(251,191,36,.08);
–blue:#60A5FA;
–violet:#A78BFA;
}

/* ═══ LAYOUT: 3 rows — header, scroll, bottom ═══ */
html{
height:100%;
background:var(–bg);
}
body{
font-family:‘Plus Jakarta Sans’,-apple-system,sans-serif;
background:var(–bg);
color:var(–fg);
height:100%;
height:100dvh;
display:flex;
flex-direction:column;
overflow:hidden;
-webkit-font-smoothing:antialiased;
}

/* Row 1: Header — fixed height, never scrolls */
.hdr{
flex-shrink:0;
padding-top:52px;  /* iPhone 13 status bar = ~47px + 5px breathing */
padding-left:16px;
padding-right:16px;
padding-bottom:10px;
background:var(–bg);
border-bottom:1px solid var(–brd);
}
.hdr-r{
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-size:18px;
font-weight:800;
letter-spacing:-.4px;
}
.logo em{
font-style:normal;
color:var(–mint);
}
.hdr-p{
display:flex;
align-items:center;
gap:10px;
}
.str-b{
font-size:10px;
font-weight:700;
color:var(–amber);
background:var(–amber-s);
border:1px solid rgba(251,191,36,.15);
padding:3px 9px;
border-radius:14px;
}
.mo{
font-size:11px;
font-weight:600;
color:var(–fg3);
}

/* Row 2: Scrollable content */
.scroll{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding-bottom:30px;  /* Extra space at end of scroll */
}

/* Row 3: Bottom panel — fixed height, never scrolls */
.bottom{
flex-shrink:0;
background:var(–sf);
border-top:1px solid var(–brd2);
padding:10px 14px 20px;
}

/* ═══ NUDGE ALERT ═══ */
.ndg{
margin:12px 16px 0;
padding:8px 12px;
border-radius:10px;
font-size:11px;
font-weight:600;
display:flex;
align-items:center;
gap:6px;
}
.ndg.ok{
background:var(–mint-s);
color:var(–mint);
border:1px solid rgba(52,211,153,.12);
}
.ndg.wr{
background:var(–amber-s);
color:var(–amber);
border:1px solid rgba(251,191,36,.12);
}

/* ═══ HERO CARD ═══ */
.hero{
margin:12px 16px;
padding:16px 18px 14px;
border-radius:16px;
background:linear-gradient(155deg,#182440,#1A2E4A,#162240);
border:1px solid rgba(255,255,255,.07);
box-shadow:0 6px 24px rgba(0,0,0,.2);
position:relative;
overflow:hidden;
}
.hero::after{
content:’’;
position:absolute;
top:-50px;right:-30px;
width:120px;height:120px;
border-radius:50%;
background:radial-gradient(circle,rgba(52,211,153,.06),transparent 70%);
pointer-events:none;
}
.h-label{
font-size:9px;
font-weight:700;
color:var(–fg3);
text-transform:uppercase;
letter-spacing:.8px;
margin-bottom:6px;
}
.h-big{
font-size:28px;
font-weight:800;
letter-spacing:-.8px;
position:relative;
z-index:1;
margin-bottom:2px;
}
.h-sub{
font-size:11px;
color:var(–fg2);
font-weight:500;
margin-bottom:14px;
}
.h-stats{
display:flex;
position:relative;
z-index:1;
border-top:1px solid rgba(255,255,255,.05);
padding-top:10px;
}
.h-st{
flex:1;
text-align:center;
}
.h-st label{
display:block;
font-size:9px;
font-weight:700;
color:var(–fg3);
text-transform:uppercase;
letter-spacing:.4px;
margin-bottom:2px;
}
.h-st .hv{
font-size:14px;
font-weight:800;
}
.hv-m{color:var(–mint)}
.hv-r{color:var(–rose)}
.hv-a{color:var(–amber)}

/* ═══ CATEGORY PILLS ═══ */
.pills{
display:flex;
gap:6px;
padding:4px 16px 8px;
overflow-x:auto;
scrollbar-width:none;
-webkit-overflow-scrolling:touch;
}
.pills::-webkit-scrollbar{display:none}
.pl{
flex-shrink:0;
display:flex;
align-items:center;
gap:4px;
padding:5px 10px;
border-radius:14px;
font-size:10px;
font-weight:600;
background:var(–sf);
border:1px solid var(–brd);
color:var(–fg2);
white-space:nowrap;
}
.pl b{color:var(–fg);font-weight:800}

/* ═══ SECTION TITLE ═══ */
.sec{
padding:12px 20px 8px;
display:flex;
justify-content:space-between;
font-size:10px;
font-weight:700;
color:var(–fg3);
text-transform:uppercase;
letter-spacing:.8px;
}
.sec .sv{
color:var(–rose);
font-weight:800;
letter-spacing:0;
}

/* ═══ LIST ITEMS ═══ */
.lst{padding:0 12px}
.it{
display:flex;
align-items:center;
gap:12px;
padding:12px 14px;
margin-bottom:8px;
background:var(–sf);
border:1px solid var(–brd);
border-radius:14px;
cursor:pointer;
transition:transform .1s;
}
.it:active{transform:scale(.975)}
.it.nw{animation:pop .35s cubic-bezier(.22,1,.36,1)}
@keyframes pop{
from{opacity:0;transform:translateY(6px) scale(.97)}
to{opacity:1;transform:none}
}
.it-i{
width:36px;height:36px;
border-radius:10px;
flex-shrink:0;
display:flex;align-items:center;justify-content:center;
font-size:18px;
background:var(–bg);
border:1px solid var(–brd);
}
.it-b{flex:1;min-width:0}
.it-n{
font-size:14px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.it-t{
display:flex;
gap:4px;
align-items:center;
margin-top:3px;
}
.tg{
font-size:9px;
font-weight:600;
color:var(–fg3);
background:rgba(255,255,255,.04);
border:1px solid var(–brd);
padding:1px 6px;
border-radius:4px;
}
.it-r{text-align:right;flex-shrink:0}
.it-v{
font-size:14px;
font-weight:800;
}
.it-v.neg{color:var(–rose)}
.it-v.pos{color:var(–mint)}
.it-h{
font-size:9px;
color:var(–fg3);
margin-top:2px;
}

/* ═══ EMPTY STATE ═══ */
.ety{
text-align:center;
padding:30px 24px;
color:var(–fg3);
}
.ety span{font-size:40px;display:block;margin-bottom:8px;opacity:.4}
.ety p{font-size:13px;line-height:1.7}
.ety b{color:var(–mint)}

/* ═══ BOTTOM: INPUT + NAV ═══ */
.bp-in{
display:flex;
gap:8px;
align-items:center;
margin-bottom:8px;
padding-bottom:8px;
border-bottom:1px solid var(–brd);
}
.bp-in input{
flex:1;
height:44px;
padding:0 14px;
background:var(–bg);
border:1.5px solid var(–brd2);
border-radius:12px;
font:16px/1 ‘Plus Jakarta Sans’,sans-serif;
font-weight:500;
color:var(–fg);
outline:none;
transition:border-color .15s;
}
.bp-in input:focus{border-color:var(–mint)}
.bp-in input::placeholder{color:var(–fg3);font-weight:400}
.bp-go{
width:44px;height:44px;
border-radius:12px;
flex-shrink:0;
background:linear-gradient(135deg,#34D399,#2BBF89);
border:none;
cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 10px rgba(52,211,153,.2);
transition:transform .1s;
}
.bp-go:active{transform:scale(.88)}
.bp-go svg{width:18px;height:18px;fill:#0C111B}
.bp-nv{
display:flex;
height:42px;
}
.bp-nv button{
flex:1;
border:none;
background:none;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
color:var(–fg3);
font-size:10px;
font-weight:600;
font-family:inherit;
cursor:pointer;
position:relative;
padding:0;
}
.bp-nv button .ic{font-size:18px;line-height:1}
.bp-nv button.on{color:var(–mint)}
.bp-nv button.on::after{
content:’’;
position:absolute;
bottom:2px;
left:50%;transform:translateX(-50%);
width:4px;height:4px;border-radius:50%;
background:var(–mint);
box-shadow:0 0 6px var(–mint);
}

/* ═══ MODALS ═══ */
.ov{
position:fixed;inset:0;z-index:200;
background:rgba(6,10,20,.7);
display:none;align-items:flex-end;
backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.ov.show{display:flex}
.sh{
background:var(–sf2);
border-radius:20px 20px 0 0;
width:100%;
max-height:70vh;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding:14px 16px 44px;
border-top:1px solid var(–brd2);
}
.sh-bar{width:30px;height:3px;border-radius:2px;background:var(–fg3);opacity:.2;margin:0 auto 12px}
.sh h3{font-size:15px;font-weight:800;margin-bottom:12px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cgi{
background:var(–bg);border:1px solid var(–brd);border-radius:12px;
padding:10px 4px;text-align:center;font-size:10px;font-weight:600;
color:var(–fg2);cursor:pointer;
}
.cgi:active{transform:scale(.93)}
.cgi span{font-size:20px;display:block;margin-bottom:2px}
.cgi.pk{border-color:var(–mint);color:var(–mint);background:var(–mint-s)}
.cgi.dl{border-color:var(–rose);color:var(–rose);background:var(–rose-s)}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.mgi{
background:var(–bg);border:1px solid var(–brd);border-radius:10px;
padding:10px;text-align:center;font-size:11px;font-weight:600;
color:var(–fg2);cursor:pointer;
}
.mgi.pk{border-color:var(–blue);color:var(–blue);background:rgba(96,165,250,.06)}

/* ═══ VIEWS ═══ */
.vw{display:none}
.vw.on{display:block}

/* ═══ HIST FILTERS ═══ */
.flt{
display:flex;
gap:6px;
padding:10px 16px;
overflow-x:auto;
scrollbar-width:none;
-webkit-overflow-scrolling:touch;
}
.flt::-webkit-scrollbar{display:none}
.fb{
flex-shrink:0;
padding:6px 12px;
border-radius:8px;
font:11px/1 ‘Plus Jakarta Sans’,sans-serif;
font-weight:600;
background:var(–sf);
border:1px solid var(–brd);
color:var(–fg3);
cursor:pointer;
white-space:nowrap;
}
.fb.on{
border-color:rgba(52,211,153,.25);
color:var(–mint);
background:var(–mint-s);
}

/* ═══ INSIGHTS ═══ */
.inz{
padding:10px 16px;
display:flex;
flex-direction:column;
gap:10px;
}
.ic{
background:var(–sf);
border:1px solid var(–brd);
border-radius:14px;
padding:14px;
}
.ic h4{
font-size:10px;
font-weight:700;
color:var(–fg3);
text-transform:uppercase;
letter-spacing:.6px;
margin-bottom:8px;
}
.ir{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px 0;
}
.ir .il{font-size:12px;font-weight:500;color:var(–fg2)}
.ir .iv{font-size:12px;font-weight:800}
.bt{height:3px;background:var(–bg);border-radius:2px;margin-top:3px;overflow:hidden}
.bf{height:100%;border-radius:2px;transition:width .4s}

/* ═══ CONFIG ═══ */
.cfc{
margin:10px 16px;
background:var(–sf);
border:1px solid var(–brd);
border-radius:14px;
padding:14px;
}
.cfc h4{
font-size:12px;
font-weight:800;
margin-bottom:10px;
}
.cr{
display:flex;
justify-content:space-between;
align-items:center;
padding:7px 0;
border-bottom:1px solid var(–brd);
font-size:12px;
font-weight:500;
}
.cr:last-child{border-bottom:none}
.cr .cv{color:var(–fg3);font-weight:700}
.db{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
font:12px/1 ‘Plus Jakarta Sans’,sans-serif;
font-weight:700;
background:var(–rose-s);
border:1px solid rgba(251,113,133,.12);
color:var(–rose);
cursor:pointer;
}

/* ═══ TOAST ═══ */
.toast{
position:fixed;
top:56px;
left:14px;right:14px;
padding:10px 16px;
border-radius:12px;
z-index:400;
font-size:13px;
font-weight:700;
transform:translateY(-120%);
opacity:0;
transition:all .3s cubic-bezier(.22,1,.36,1);
pointer-events:none;
}
.toast.vis{transform:translateY(0);opacity:1}
.toast.ok{background:var(–mint);color:var(–bg)}
.toast.er{background:var(–rose);color:#fff}

@media print{body{display:none}}
</style>

</head>
<body>

<!-- ═══ ROW 1: HEADER ═══ -->

<div class="hdr">
  <div class="hdr-r">
    <div class="logo">💰 Cash<em>Flow</em></div>
    <div class="hdr-p">
      <span class="str-b" id="stB">🔥 0</span>
      <span class="mo" id="mL"></span>
    </div>
  </div>
</div>

<!-- ═══ ROW 2: SCROLLABLE CONTENT ═══ -->

<div class="scroll" id="scrollArea">

  <!-- DASHBOARD -->

  <!-- HISTORIAL -->

  <div class="vw" id="v-hist">
    <div class="flt" id="hfR"></div>
    <div class="lst" id="lHi"></div>
  </div>

  <!-- INSIGHTS -->

  <div class="vw" id="v-ins">
    <div class="inz" id="inZ"></div>
  </div>

  <!-- CONFIG -->

  <div class="vw" id="v-cfg">

      <div class="cr"><span>Registros</span><span class="cv" id="cfN">0</span></div>

      <button class="db" onclick="doExp()">📤 Exportar JSON</button>
      <button class="db" onclick="askW()">🗑️ Borrar datos</button>
    </div>
  </div>

</div>

<!-- ═══ ROW 3: BOTTOM PANEL ═══ -->

<div class="bottom">
  <div class="bp-in">
    <input id="inp" type="text" placeholder="almuerzo 20k" enterkeyhint="send" autocomplete="off" autocapitalize="none">
    <button class="bp-go" onclick="sub()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
  <div class="bp-nv">
    <button class="on" onclick="go('dash')" id="nb-dash"><span class="ic">📊</span>Inicio</button>
    <button onclick="go('hist')" id="nb-hist"><span class="ic">📋</span>Historial</button>
    <button onclick="go('ins')" id="nb-ins"><span class="ic">📈</span>Insights</button>
    <button onclick="go('cfg')" id="nb-cfg"><span class="ic">⚙️</span>Config</button>
  </div>
</div>

<!-- ═══ MODALS ═══ -->

<div class="toast" id="toast"></div>

<div class="ov" id="oE" onclick="if(event.target===this)clM()">
  <div class="sh">
    <div class="sh-bar"></div>
    <h3 id="eT">Editar</h3>
    <div class="cg" id="eG"></div>
    <h3 style="margin-top:14px">Método de pago</h3>
    <div class="mg" id="eM"></div>
  </div>
</div>

<div class="ov" id="oW" onclick="if(event.target===this)clM()">
  <div class="sh">
    <div class="sh-bar"></div>
    <h3>¿Borrar todos los datos?</h3>
    <p style="color:var(--fg2);font-size:12px;margin-bottom:14px">No se puede deshacer.</p>
    <div style="display:flex;gap:8px">
      <button style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--brd);background:var(--sf);color:var(--fg2);font:13px/1 'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer" onclick="clM()">Cancelar</button>
      <button class="db" style="flex:1;margin:0" onclick="doW()">Confirmar</button>
    </div>
  </div>
</div>

const FJ=[
  {n:'Bancolombia',v:1100000},
  {n:'Cuota carro',v:561000},
  {n:'Arriendo Medellín',v:800000},
  {n:'Mamá',v:300000},
  {n:'Gasolina',v:300000},
  {n:'Seguro vehículo',v:200000},
  {n:'Internet/cel',v:190000},
  {n:'Peajes',v:112000},
  {n:'Internet La Ceja',v:80000},
  {n:'iCloud',v:44000},
  {n:'Barbería',v:40000},
  {n:'Netflix',v:29000}
];

// ═══ STATE ═══
let D={items:[],learned:{},streak:{last:'',count:0}};
let pend=null, edId=null;

// ═══ STORAGE ═══
function ld(){
  try{
    const s=localStorage.getItem(KEY);
    if(s) D=JSON.parse(s);
  }catch(e){}
  if(!D||!D.items) D={items:[],learned:{},streak:{last:'',count:0}};
}
function sv(){localStorage.setItem(KEY,JSON.stringify(D))}

// ═══ HELPERS ═══
function mk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function dk(i){return i.slice(0,10)}
function hoy(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function cm(){return mk(new Date())}
function $(n){return'$'+Math.abs(n).toLocaleString('es-CO')}
function $k(n){const a=Math.abs(n);return a>=1e6?'$'+(a/1e6).toFixed(1).replace('.0','')+'M':a>=1e3?'$'+Math.round(a/1e3)+'K':'$'+a}
function fd(i){const d=new Date(i);return d.getDate()+' '+MN[d.getMonth()]}
function ft(i){const d=new Date(i);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function dm(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0).getDate()}

// ═══ STREAK ═══
function uS(){
  const h=hoy();
  if(D.streak.last===h) return;
  const y=new Date();
  y.setDate(y.getDate()-1);
  const ys=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  D.streak.count = D.streak.last===ys ? D.streak.count+1 : 1;
  D.streak.last=h;
  sv();
}

// ═══ PARSER ═══
function parse(r){
  let t=r.trim();
  if(!t) return null;
  let tipo='gasto', conf=1;

  if(t.startsWith('+')){tipo='ingreso';t=t.slice(1).trim()}
  else if(/^ingreso\s/i.test(t)){tipo='ingreso';t=t.replace(/^ingreso\s+/i,'')}

  let met='efectivo';
  const mm={efectivo:['efectivo','cash'],nequi:['nequi','daviplata'],tarjeta:['tarjeta','tc','visa','mastercard'],transferencia:['transferencia','transf','pse']};
  for(const[m,ks]of Object.entries(mm)){
    for(const k of ks){
      const re=new RegExp('\\b'+k+'\\b','i');
      if(re.test(t)){met=m;t=t.replace(re,'').trim();break}
    }
  }

  const rx=/(\d[\d.,]*)\s*(k|m|mil|millón|millon)?/gi;
  const ms=[...t.matchAll(rx)];
  if(!ms.length) return null;

  let as='',amt=0;
  for(const m of ms){
    let ns=m[1].replace(/\./g,'').replace(',','.');
    const sf=(m[2]||'').toLowerCase();
    let n=parseFloat(ns);
    if(isNaN(n)) continue;
    if(sf==='k'||sf==='mil') n*=1e3;
    else if(sf==='m'||sf==='millón'||sf==='millon') n*=1e6;
    as=m[0];amt=n;break;
  }
  if(!as||amt<=0) return null;
  if(amt<1000) amt*=1000;
  amt=Math.round(amt);

  let desc=t.replace(as,'').replace(/\s+/g,' ').trim();
  if(!desc) desc=tipo==='ingreso'?'Ingreso':'Gasto';
  desc=desc.charAt(0).toUpperCase()+desc.slice(1);

  const cat=fCat(desc,tipo);
  if(cat.id==='otros') conf=0.5;
  if(desc.length<=2) conf=0.4;

  return{
    id:'cf'+Date.now()+Math.random().toString(36).slice(2,5),
    desc, monto:amt, cat:cat.id, catE:cat.e, catN:cat.n,
    metodo:met, tipo,
    fecha:new Date().toISOString(), mes:cm(),
    confianza:conf
  };
}

function fCat(d,tipo){
  if(tipo==='ingreso'){
    const l=d.toLowerCase();
    if(l.match(/visual|publicidad/)) return{id:'i_vp',e:'🖨️',n:'Visual'};
    if(l.match(/escudero|ingeniería|ingenieria|servicio/)) return{id:'i_esc',e:'⚙️',n:'Escudero'};
    if(l.match(/pasivo|consignación/)) return{id:'i_pas',e:'💎',n:'Pasivo'};
    return{id:'i_o',e:'💰',n:'Ingreso'};
  }
  const l=d.toLowerCase();
  for(const[w,c] of Object.entries(D.learned)){
    if(l.includes(w)){const x=CATS.find(z=>z.id===c);if(x)return x}
  }
  for(const c of CATS) for(const w of c.w) if(l.includes(w)) return c;
  return CATS.find(c=>c.id==='otros');
}

// ═══ ACTIONS ═══
function sub(){
  const i=document.getElementById('inp');
  const t=i.value.trim();
  if(!t) return;
  const p=parse(t);
  if(!p){toast('No entendí — Ej: almuerzo 20k',1);return}
  reg(p);
  i.value='';
}

function reg(it){
  D.items.push(it);
  uS();
  sv();
  toast(it.catE+' '+it.desc+' '+(it.tipo==='ingreso'?'+':'-')+$(it.monto));
  if(navigator.vibrate) navigator.vibrate(20);
  rAll();
}

function oEd(id){
  edId=id;
  const it=D.items.find(x=>x.id===id);
  if(!it) return;
  document.getElementById('eT').textContent=it.desc;
  document.getElementById('eG').innerHTML=CATS.map(c=>
    `<div class="cgi${c.id===it.cat?' pk':''}" onclick="chC('${c.id}')"><span>${c.e}</span>${c.n}</div>`
  ).join('')+`<div class="cgi dl" onclick="del('${id}')"><span>🗑️</span>Eliminar</div>`;
  document.getElementById('eM').innerHTML=MTS.map(m=>
    `<div class="mgi${m.id===it.metodo?' pk':''}" onclick="chM('${m.id}')">${m.e} ${m.n}</div>`
  ).join('');
  document.getElementById('oE').classList.add('show');
}

function chC(c){
  const it=D.items.find(x=>x.id===edId);if(!it)return;
  const ct=CATS.find(x=>x.id===c);if(!ct)return;
  const w=it.desc.toLowerCase().split(' ')[0];
  if(w&&c!=='otros') D.learned[w]=c;
  it.cat=ct.id;it.catE=ct.e;it.catN=ct.n;
  sv();clM();rAll();toast(ct.e+' → '+ct.n);
}

function chM(m){
  const it=D.items.find(x=>x.id===edId);if(!it)return;
  it.metodo=m;sv();clM();rAll();
}

function del(id){
  D.items=D.items.filter(x=>x.id!==id);
  sv();clM();rAll();toast('Eliminado');
}

function clM(){
  document.querySelectorAll('.ov').forEach(o=>o.classList.remove('show'));
  edId=null;
}

function toast(m,e){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.className='toast vis '+(e?'er':'ok');
  setTimeout(()=>t.className='toast',2200);
}

// ═══ RENDER ALL ═══
function rAll(){
  rD();rH();rI();rC();
  const b=document.getElementById('stB');
  b.textContent='🔥 '+D.streak.count;
  b.style.display=D.streak.count>0?'inline':'none';
}

// ═══ DASHBOARD ═══
function rD(){
  const now=new Date(), ma=cm(), h=hoy(), day=now.getDate(), dr=dm()-day+1;
  const ml=MN[now.getMonth()]+' '+now.getFullYear();
  ['mL','mLH','mLI'].forEach(id=>{
    const e=document.getElementById(id);
    if(e) e.textContent=ml;
  });

  const all=D.items.filter(x=>x.mes===ma);
  let ti=0,tg=0;
  all.forEach(x=>{if(x.tipo==='ingreso')ti+=x.monto;else tg+=x.monto});

  const rest=PV-tg;
  const pd=dr>0?Math.round(rest/dr):0;

  const hb=document.getElementById('hB');
  hb.textContent=(rest>=0?'':'-')+$(rest);
  hb.style.color=rest>0?'var(--mint)':'var(--rose)';

  document.getElementById('hS').textContent=`de ${$(PV)} · ${dr} días restantes`;
  document.getElementById('hI').textContent=$(ti);
  document.getElementById('hG').textContent=$(tg);

  const hd=document.getElementById('hD');
  hd.textContent=pd>0?$(pd):'$0';
  hd.style.color=pd>0?'var(--amber)':'var(--rose)';

  // Nudge
  const nz=document.getElementById('nZ');
  const ih=D.items.filter(x=>dk(x.fecha)===h);
  if(!ih.length && now.getHours()>=10){
    nz.innerHTML='<div class="ndg wr">⏰ No has registrado gastos hoy</div>';
  } else if(ih.length){
    const lt=new Date(ih[ih.length-1].fecha);
    const hr=Math.round((now-lt)/3.6e6);
    if(hr>=4) nz.innerHTML=`<div class="ndg wr">⏰ Último registro hace ${hr}h</div>`;
    else nz.innerHTML=`<div class="ndg ok">✅ ${ih.length} registro${ih.length>1?'s':''} · 🔥 ${D.streak.count}d</div>`;
  } else {
    nz.innerHTML='';
  }

  // Category pills
  const ct={};
  all.filter(x=>x.tipo==='gasto').forEach(x=>{
    if(!ct[x.cat]) ct[x.cat]={m:0,e:x.catE,n:x.catN};
    ct[x.cat].m+=x.monto;
  });
  document.getElementById('pls').innerHTML=Object.entries(ct)
    .sort((a,b)=>b[1].m-a[1].m)
    .map(([,c])=>`<div class="pl">${c.e} ${c.n} <b>${$k(c.m)}</b></div>`)
    .join('');

  // Today items
  const dh=D.items.filter(x=>dk(x.fecha)===h).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  let gh=0;
  dh.filter(x=>x.tipo==='gasto').forEach(x=>gh+=x.monto);
  document.getElementById('tH').textContent=gh>0?'-'+$(gh):'';
  document.getElementById('lH').innerHTML=dh.length
    ? dh.map((x,i)=>iH(x,i===0)).join('')
    : '<div class="ety"><span>✏️</span><p>Escribe tu primer gasto<br><b>Ej: almuerzo 20k</b></p></div>';
}

function iH(x,nw){
  const s=x.tipo==='ingreso'?'+':'-';
  const cl=x.tipo==='ingreso'?'pos':'neg';
  const mt=MTS.find(m=>m.id===x.metodo);
  return `<div class="it${nw?' nw':''}" onclick="oEd('${x.id}')">
    <div class="it-i">${x.catE}</div>
    <div class="it-b">
      <div class="it-n">${x.desc}</div>
      <div class="it-t">
        <span class="tg">${x.catN}</span>
        ${mt?`<span class="tg">${mt.e} ${mt.n}</span>`:''}
      </div>
    </div>
    <div class="it-r">
      <div class="it-v ${cl}">${s}${$(x.monto)}</div>
      <div class="it-h">${ft(x.fecha)}</div>
    </div>
  </div>`;
}

// ═══ HISTORIAL ═══
function rH(){
  const all=D.items.filter(x=>x.mes===cm()).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const cats=[...new Set(all.filter(x=>x.tipo==='gasto').map(x=>x.cat))];
  document.getElementById('hfR').innerHTML=
    `<button class="fb on" onclick="fH(this,'all')">Todos</button>` +
    `<button class="fb" onclick="fH(this,'ingreso')">💰 Ingresos</button>` +
    cats.map(c=>{
      const ct=CATS.find(x=>x.id===c)||{e:'📌',n:c};
      return `<button class="fb" onclick="fH(this,'${c}')">${ct.e} ${ct.n}</button>`;
    }).join('');
  bHL(all);
}

function bHL(items){
  const pd={};
  items.forEach(x=>{const d=dk(x.fecha);if(!pd[d])pd[d]=[];pd[d].push(x)});
  let h='';
  Object.entries(pd).forEach(([,gs])=>{
    const t=gs.filter(x=>x.tipo==='gasto').reduce((s,x)=>s+x.monto,0);
    h+=`<div class="sec"><span>${fd(gs[0].fecha)}</span><span class="sv">${t?'-'+$(t):''}</span></div>`;
    gs.forEach(x=>h+=iH(x,false));
  });
  document.getElementById('lHi').innerHTML=h||'<div class="ety"><span>📋</span><p>Sin registros</p></div>';
}

function fH(b,f){
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  let it=D.items.filter(x=>x.mes===cm());
  if(f==='ingreso') it=it.filter(x=>x.tipo==='ingreso');
  else if(f!=='all') it=it.filter(x=>x.cat===f);
  it.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  bHL(it);
}

// ═══ INSIGHTS ═══
function rI(){
  const now=new Date(), day=now.getDate();
  const all=D.items.filter(x=>x.mes===cm());
  const g=all.filter(x=>x.tipo==='gasto');
  const tg=g.reduce((s,x)=>s+x.monto,0);

  const ct={};
  g.forEach(x=>{if(!ct[x.cat])ct[x.cat]={m:0,e:x.catE,n:x.catN};ct[x.cat].m+=x.monto});
  const top=Object.entries(ct).sort((a,b)=>b[1].m-a[1].m).slice(0,5);
  const mx=top.length?top[0][1].m:1;

  const avg=day?Math.round(tg/day):0;
  const proj=avg*dm();
  const pct=PV?Math.round(tg/PV*100):0;

  const mt={};
  g.forEach(x=>{if(!mt[x.metodo])mt[x.metodo]=0;mt[x.metodo]+=x.monto});

  let h=`<div class="ic"><h4>📊 Resumen</h4>
    <div class="ir"><div class="il">📅 Día ${day} de ${dm()}</div><div class="iv">${Math.round(day/dm()*100)}%</div></div>
    <div class="ir"><div class="il">💸 Promedio diario</div><div class="iv" style="color:var(--rose)">${$(avg)}</div></div>
    <div class="ir"><div class="il">📈 Proyección mes</div><div class="iv" style="color:${proj>PV?'var(--rose)':'var(--amber)'}">${$(proj)}</div></div>
    <div class="ir"><div class="il">⚡ Uso presupuesto</div><div class="iv" style="color:${pct>100?'var(--rose)':pct>75?'var(--amber)':'var(--mint)'}">${pct}%</div></div>
  </div>`;

  if(top.length){
    h+=`<div class="ic"><h4>🏆 Top categorías</h4>`;
    top.forEach(([,c])=>{
      const p=Math.round(c.m/mx*100);
      h+=`<div class="ir"><div class="il">${c.e} ${c.n}</div><div class="iv">${$(c.m)}</div></div>`;
      h+=`<div class="bt"><div class="bf" style="width:${p}%;background:linear-gradient(90deg,var(--mint),var(--blue))"></div></div>`;
    });
    h+=`</div>`;
  }

  const tm=Object.entries(mt).sort((a,b)=>b[1]-a[1]);
  if(tm.length){
    h+=`<div class="ic"><h4>💳 Métodos</h4>`;
    tm.forEach(([mid,v])=>{
      const m=MTS.find(x=>x.id===mid)||{e:'💵',n:mid};
      h+=`<div class="ir"><div class="il">${m.e} ${m.n}</div><div class="iv">${$(v)}</div></div>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="ic"><h4>🔥 Constancia</h4>
    <div class="ir"><div class="il">Streak</div><div class="iv" style="color:var(--amber)">${D.streak.count} día${D.streak.count!==1?'s':''}</div></div>
    <div class="ir"><div class="il">Registros mes</div><div class="iv">${all.length}</div></div>
  </div>`;

  document.getElementById('inZ').innerHTML=h;
}

// ═══ CONFIG ═══
function rC(){
  document.getElementById('cfF').innerHTML=FJ.map(f=>
    `<div class="cr"><span>${f.n}</span><span class="cv">${$(f.v)}</span></div>`
  ).join('')+`<div class="cr" style="font-weight:800;padding-top:8px;margin-top:4px;border-top:1px solid var(--brd2)"><span>Total</span><span class="cv" style="color:var(--rose)">${$(GF)}</span></div>`;

  const all=D.items.filter(x=>x.mes===cm());
  const tg=all.filter(x=>x.tipo==='gasto').reduce((s,x)=>s+x.monto,0);
  const ti=all.filter(x=>x.tipo==='ingreso').reduce((s,x)=>s+x.monto,0);
  document.getElementById('cfM').innerHTML=`
    <div class="cr"><span>Gastos</span><span class="cv" style="color:var(--rose)">${$(tg)}</span></div>
    <div class="cr"><span>Ingresos</span><span class="cv" style="color:var(--mint)">${$(ti)}</span></div>
    <div class="cr"><span>Ingreso pasivo</span><span class="cv">${$(IP)}</span></div>
    <div class="cr"><span>Fijos</span><span class="cv">${$(GF)}</span></div>
    <div class="cr"><span>Presup. variable</span><span class="cv" style="color:var(--amber)">${$(PV)}</span></div>`;

  document.getElementById('cfN').textContent=D.items.length;
  document.getElementById('cfL').textContent=Object.keys(D.learned).length;
}

// ═══ NAV ═══
function go(v){
  document.querySelectorAll('.vw').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.bp-nv button').forEach(e=>e.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.getElementById('nb-'+v).classList.add('on');
  document.getElementById('scrollArea').scrollTop=0;
}

// ═══ EXPORT / RESET ═══
function doExp(){
  const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='cashflow_'+cm()+'.json';a.click();
  URL.revokeObjectURL(u);
  toast('Exportado ✓');
}

function askW(){document.getElementById('oW').classList.add('show')}

function doW(){
  D={items:[],learned:{},streak:{last:'',count:0}};
  sv();rAll();clM();toast('Datos eliminados');
}

// ═══ INIT ═══
ld();
rAll();
document.getElementById('inp').addEventListener('keydown',e=>{
  if(e.key==='Enter') sub();
});
</script>
