<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PrestaGest">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2300D4AA'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%230A0E1A' font-family='sans-serif' font-weight='bold'%3EPG%3C/text%3E%3C/svg%3E">
    
    <title>PrestaGest Pro v6.1 - ERP</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-base: #0A0E1A; --bg-card: #141824; --bg-card-hover: #1b2131;
            --primary: #00D4AA; --primary-dark: #00a887;
            --warning: #FF6B35; --danger: #FF3B30; --success: #34C759;
            --info: #007AFF; --special: #AF82FF;
            --text-main: #E8EDF5; --text-muted: #8E98A8;
            --border: #2A3142; --radius: 16px;
            --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); line-height: 1.5; padding-top: var(--safe-top); padding-bottom: calc(80px + var(--safe-bottom)); overflow-x: hidden; }
        
        .hidden { display: none !important; }
        .flex { display: flex; } .flex-col { display: flex; flex-direction: column; }
        .justify-between { justify-content: space-between; } .items-center { align-items: center; }
        .text-center { text-align: center; } .text-right { text-align: right; }
        .text-primary { color: var(--primary); } .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); } .text-success { color: var(--success); }
        .text-info { color: var(--info); }
        .text-muted { color: var(--text-muted); font-size: 0.85rem; }
        .font-bold { font-weight: 700; } .mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; } 
        .mb-1 { margin-bottom: 0.5rem; } .mb-2 { margin-bottom: 1rem; } .gap-1 { gap: 0.5rem; } .gap-2 { gap: 1rem; }

        h1 { font-size: 1.5rem; font-weight: 700; } h2 { font-size: 1.25rem; font-weight: 600; } h3 { font-size: 1.1rem; font-weight: 600; }
        .currency { font-weight: 700; font-variant-numeric: tabular-nums; }
        .big-amount { font-size: 2rem; color: var(--primary); line-height: 1.1; }

        .container { padding: 1rem; max-width: 600px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: var(--radius); padding: 1rem; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .btn { background: var(--border); color: var(--text-main); border: none; padding: 0.8rem 1rem; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; justify-content: center; align-items: center; gap: 0.5rem; font-size: 0.95rem; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-info { background: rgba(0, 122, 255, 0.1); color: var(--info); border: 1px solid var(--info); }
        .btn-warning { background: rgba(255, 107, 53, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .btn-block { width: 100%; }

        .input-group { margin-bottom: 1rem; width: 100%; }
        .input-group label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; color: var(--text-muted); }
        .form-control { width: 100%; background-color: var(--bg-base); border: 1px solid var(--border); color: var(--text-main); padding: 0.8rem; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
        .form-control:focus { border-color: var(--primary); }
        select.form-control { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238E98A8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 1rem top 50%; background-size: 0.65rem auto; padding-right: 2.5rem; }
        select.form-control option { background-color: var(--bg-base); color: var(--text-main); }
        .form-row { display: flex; gap: 1rem; flex-wrap: wrap; } .form-row > * { flex: 1; min-width: 120px; }

        .chip-scroll { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 0.5rem; -webkit-overflow-scrolling: touch; }
        .chip-scroll::-webkit-scrollbar { display: none; }
        .chip { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .chip.active { background: rgba(0, 212, 170, 0.15); border-color: var(--primary); color: var(--primary); }
        .chip.chip-alert.active { background: rgba(255, 107, 53, 0.15); border-color: var(--warning); color: var(--warning); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20, 24, 36, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 0.8rem 0 calc(0.8rem + var(--safe-bottom)) 0; z-index: 100; }
        .nav-item { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 0.5rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; font-size: 0.75rem; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); } 
        .nav-item svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-fab { background: var(--primary); color: #000; border-radius: 50%; width: 48px; height: 48px; display: flex; justify-content: center; align-items: center; margin-top: -15px; box-shadow: 0 4px 10px rgba(0,212,170,0.3); }

        .loan-card { margin-bottom: 1rem; cursor: pointer; transition: transform 0.2s; position: relative;}
        .loan-card:active { transform: translateY(2px); background: var(--bg-card-hover); }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        .status-activo { background: rgba(0, 212, 170, 0.1); color: var(--primary); }
        .status-mora { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
        .status-alerta { background: rgba(255, 107, 53, 0.1); color: var(--warning); }
        .status-pagado { background: rgba(142, 152, 168, 0.1); color: var(--text-muted); }
        .status-pausado { background: rgba(0, 122, 255, 0.1); color: var(--info); }
        .status-solocap { background: rgba(175, 130, 255, 0.1); color: var(--special); }
        .status-renovar { background: rgba(175, 130, 255, 0.2); color: #D4A5FF; box-shadow: 0 0 8px rgba(175, 130, 255, 0.4); animation: pulse 2s infinite; }
        
        .score-stars { color: #FFD700; font-size: 0.8rem; letter-spacing: 2px; }
        .progress-bar { height: 6px; background: var(--bg-base); border-radius: 3px; margin-top: 0.3rem; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #00F5C8); border-radius: 3px; transition: width 0.3s ease; }
        
        .health-bar { display: flex; height: 8px; background: var(--bg-base); border-radius: 4px; overflow: hidden; margin-top: 0.5rem; }
        .health-sano { background: var(--primary); transition: width 0.5s; }
        .health-mora { background: var(--danger); transition: width 0.5s; }

        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 1rem; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px; }
        th, td { padding: 0.8rem; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th:first-child, td:first-child { text-align: left; }
        th { background: var(--bg-base); color: var(--text-muted); font-weight: 600; position: sticky; top: 0; }
        tr.row-pagada { background: rgba(52, 199, 89, 0.05); color: var(--text-muted); }
        tr.row-actual { background: rgba(255, 107, 53, 0.08); font-weight: bold; }
        tr.row-mora { background: rgba(255, 59, 48, 0.08); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .drawer { background: var(--bg-base); width: 100%; max-width: 600px; border-radius: 24px 24px 0 0; padding: 1.5rem; padding-bottom: calc(1.5rem + var(--safe-bottom)); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .drawer { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 5px; background: var(--border); border-radius: 3px; margin: 0 auto 1rem auto; }

        .wizard-steps { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: 0.3s; }
        .step-dot.active { background: var(--primary); transform: scale(1.2); }
        .wizard-pane { display: none; animation: fadeIn 0.3s ease; }
        .wizard-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .global-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
        .summary-box { background: var(--bg-card); padding: 1rem; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
        .info-item { background: var(--bg-base); padding: 0.8rem; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; border: 1px solid var(--border); }
        .info-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 0.2rem; }
        .info-value { font-size: 1rem; font-weight: 700; color: var(--text-main); }
        .info-value.highlight { color: var(--primary); font-size: 1.2rem; }
        .info-value.danger { color: var(--danger); }

        .avatar-circle { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), #00F5C8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 800; font-size: 1.3rem; margin-right: 1rem; box-shadow: 0 4px 10px rgba(0,212,170,0.3); flex-shrink: 0; }
        .card-inner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1rem; margin-bottom: 0.5rem; background: var(--bg-base); padding: 0.8rem; border-radius: 12px; border: 1px solid var(--border); }

        .note-card { background: var(--bg-base); border-left: 3px solid var(--primary); padding: 0.8rem; border-radius: 0 8px 8px 0; margin-bottom: 0.5rem; font-size: 0.85rem; }
        .alert-banner { background: rgba(255, 59, 48, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.8rem; border-radius: 12px; font-size: 0.85rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        .action-main { grid-column: span 2; padding: 1rem; font-size: 1.05rem; }
        .action-full { grid-column: span 2; }

        .toast-container { position: fixed; top: calc(20px + var(--safe-top)); left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast { background: rgba(52, 199, 89, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: #fff; padding: 0.8rem 1.5rem; border-radius: 30px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); opacity: 0; transform: translateY(-20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-error { background: rgba(255, 59, 48, 0.95); }
        
        /* Estilos específicos de Caja */
        .caja-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .caja-card { background: var(--bg-card); padding: 1.2rem; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .caja-movimiento { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .caja-movimiento:last-child { border-bottom: none; }
        .mov-ingreso { color: var(--success); }
        .mov-egreso { color: var(--danger); }
        .mov-transferencia { color: var(--info); }
    </style>
</head>

    <div class="toast-container" id="toast-container"></div>

        <div class="flex justify-between items-center mb-2">
            <h1>Presta<span class="text-primary">Gest</span></h1>
            <button class="btn" onclick="app.openSettings()" style="padding: 0.5rem; border-radius: 50%; background: transparent; border: 1px solid var(--border);">

            </button>
        </div>
        
        <div class="card mb-2" style="background: linear-gradient(135deg, rgba(0,212,170,0.1), transparent); border-color: var(--primary);">
            <div class="flex justify-between items-center mb-1">
                <div>
                    <div class="text-muted text-sm font-bold uppercase">Proyección Ingresos (Mes)</div>
                    <div class="currency big-amount" id="dash-flujo">$0</div>
                </div>
                <div class="text-primary">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>

            </div>
            <div class="text-xs text-muted">Salud de la Cartera Activa: <span id="dash-health-text" class="font-bold text-primary">100% Sano</span></div>
            <div class="health-bar">
                <div class="health-sano" id="dash-bar-sano" style="width: 100%;"></div>

        <div class="global-summary">

                <div class="text-muted text-sm">Cartera Activa</div>
                <div class="currency text-primary" id="dash-cartera">$0</div>
            </div>
            <div class="summary-box">
                <div class="text-muted text-sm">Capital en
